<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>StockScan — IDC3</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=Noto+Sans+Thai:wght@300;400;500;700&family=Space+Mono&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal:#09D1C7;--teal-dim:#E4F7F6;--teal-border:#99DDD9;
      --mint:#46DFB1;--mint-dim:#E5F7F0;--mint-border:#96DEC5;
      --mid-teal:#15919B;--deep-teal:#0C6478;--navy:#213A58;
      --bg:#EEF5F7;--surface:#FFFFFF;--surface2:#F5FAFB;
      --txt:#213A58;--txt2:#4A6878;--txt3:#8AACB8;
      --r:14px;--r2:20px;--r3:28px;
      --shadow-sm:0 1px 4px rgba(33,58,88,0.06),0 2px 8px rgba(33,58,88,0.04);
      --shadow-md:0 4px 16px rgba(33,58,88,0.08),0 1px 4px rgba(33,58,88,0.05);
      --emp-grad:linear-gradient(145deg,#4b928b 0%,#68b4aa 35%,#9bd8c6 70%,#ebd08d 100%);
      --emp-glass:rgba(255,255,255,0.45);--emp-border:rgba(255,255,255,0.6);
      --emp-dark:#233446;--emp-muted:#4a6572;
    }
    *,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
    html,body{height:100%;background:var(--bg);}
    body{font-family:'Noto Sans Thai',sans-serif;font-size:14px;line-height:1.5;color:var(--txt);}
    #root{max-width:390px;margin:0 auto;min-height:100vh;}
    input,select,button{font-family:inherit;}
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}

    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    @keyframes toastPop{from{opacity:0;transform:translateX(-50%) translateY(8px) scale(0.92)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
    @keyframes scanLine{0%,100%{top:8px;opacity:0}10%{opacity:1}90%{opacity:1}50%{top:calc(100% - 8px)}}
    @keyframes shake{0%,100%{transform:none}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
    @keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
    @keyframes empUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:0.8}}

    /* ═══════════════════════════════════════
       CINEMATIC LOGIN ANIMATIONS
    ═══════════════════════════════════════ */
    @keyframes cin-bg-reveal {
      0%   { transform: scale(1.18); opacity:0; }
      100% { transform: scale(1);    opacity:1; }
    }
    @keyframes cin-layer-drift {
      0%   { transform: translateY(0px)   scale(1); }
      50%  { transform: translateY(-14px) scale(1.03); }
      100% { transform: translateY(0px)   scale(1); }
    }
    @keyframes cin-orb-float {
      0%,100% { transform: translate(0,0)    scale(1); }
      33%     { transform: translate(12px,-18px) scale(1.08); }
      66%     { transform: translate(-10px,8px)  scale(0.95); }
    }
    @keyframes cin-orb-float2 {
      0%,100% { transform: translate(0,0)     scale(1); }
      40%     { transform: translate(-16px,10px) scale(1.06); }
      70%     { transform: translate(8px,-12px)  scale(0.97); }
    }
    @keyframes cin-scanline {
      0%   { top:0%; opacity:0; }
      5%   { opacity:1; }
      95%  { opacity:0.5; }
      100% { top:100%; opacity:0; }
    }
    @keyframes cin-grid-in {
      from { opacity:0; transform:perspective(600px) rotateX(12deg) scale(0.94); }
      to   { opacity:1; transform:perspective(600px) rotateX(0deg)  scale(1); }
    }
    @keyframes cin-card-rise {
      0%   { opacity:0; transform:translateY(40px) scale(0.94); filter:blur(6px); }
      60%  { filter:blur(0px); }
      100% { opacity:1; transform:translateY(0)    scale(1);    filter:blur(0px); }
    }
    @keyframes cin-logo-pop {
      0%   { opacity:0; transform:scale(0.6) rotate(-8deg); filter:blur(4px); }
      60%  { transform:scale(1.08) rotate(2deg); }
      100% { opacity:1; transform:scale(1) rotate(0deg); filter:blur(0); }
    }
    @keyframes cin-title-slide {
      0%   { opacity:0; transform:translateX(-24px) skewX(4deg); letter-spacing:6px; }
      100% { opacity:1; transform:translateX(0)      skewX(0);    letter-spacing:1.5px; }
    }
    @keyframes cin-subtitle-fade {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:0.7; transform:translateY(0); }
    }
    @keyframes cin-field-in {
      from { opacity:0; transform:translateX(-16px); }
      to   { opacity:1; transform:translateX(0); }
    }
    @keyframes cin-btn-glow {
      0%,100% { box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
      50%     { box-shadow: 0 8px 32px rgba(255,255,255,0.35), 0 0 0 3px rgba(255,255,255,0.12); }
    }
    @keyframes cin-particle {
      0%   { transform:translateY(100vh) rotate(0deg);   opacity:0; }
      10%  { opacity:0.6; }
      90%  { opacity:0.2; }
      100% { transform:translateY(-10vh) rotate(720deg); opacity:0; }
    }
    @keyframes cin-shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    @keyframes cin-hint-blink {
      0%,100% { opacity:0.45; }
      50%     { opacity:0.85; }
    }
    @keyframes cin-vignette-in {
      from { opacity:0; }
      to   { opacity:1; }
    }
    @keyframes cin-noise {
      0%,100% { transform:translate(0,0); }
      10%  { transform:translate(-1%,-1%); }
      30%  { transform:translate(1%, 0%); }
      50%  { transform:translate(0%, 1%); }
      70%  { transform:translate(-1%, 0%); }
      90%  { transform:translate(1%,-1%); }
    }

    /* Login wrapper */
    .cin-wrap {
      position:fixed; inset:0; z-index:1000;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      overflow:hidden;
      font-family:'Prompt',sans-serif;
    }

    /* Animated background layers */
    .cin-bg {
      position:absolute; inset:0;
      animation: cin-bg-reveal 1.4s cubic-bezier(0.22,1,0.36,1) both;
    }
    .cin-bg-grad {
      position:absolute; inset:0;
      background: linear-gradient(160deg,#072D3A 0%,#0C5060 28%,#0E7A82 55%,#14A89A 78%,#2DD4BF 100%);
    }
    .cin-noise-layer {
      position:absolute; inset:-20%;
      width:140%; height:140%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity:0.04;
      animation: cin-noise 8s steps(2) infinite;
    }
    /* Depth orbs */
    .cin-orb {
      position:absolute; border-radius:50%;
      filter:blur(60px); pointer-events:none;
    }
    .cin-orb-1 {
      width:320px; height:320px;
      top:-80px; right:-80px;
      background:radial-gradient(circle, rgba(9,209,199,0.35) 0%, transparent 70%);
      animation: cin-orb-float 9s ease-in-out infinite;
    }
    .cin-orb-2 {
      width:260px; height:260px;
      bottom:-60px; left:-60px;
      background:radial-gradient(circle, rgba(70,223,177,0.28) 0%, transparent 70%);
      animation: cin-orb-float2 11s ease-in-out infinite;
    }
    .cin-orb-3 {
      width:180px; height:180px;
      top:38%; left:30%;
      background:radial-gradient(circle, rgba(21,145,155,0.22) 0%, transparent 70%);
      animation: cin-orb-float 13s ease-in-out infinite 2s;
    }
    /* Parallax depth grid */
    .cin-grid {
      position:absolute; inset:0;
      background-image:
        linear-gradient(rgba(9,209,199,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(9,209,199,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      transform-origin: center bottom;
      animation: cin-grid-in 1.8s cubic-bezier(0.22,1,0.36,1) 0.2s both,
                 cin-layer-drift 20s ease-in-out infinite 2s;
    }
    /* Scanline sweep */
    .cin-scanline {
      position:absolute; left:0; right:0; top:0; height:2px;
      background:linear-gradient(90deg, transparent 0%, rgba(9,209,199,0.6) 40%, rgba(70,223,177,0.8) 50%, rgba(9,209,199,0.6) 60%, transparent 100%);
      box-shadow: 0 0 12px rgba(9,209,199,0.5), 0 0 30px rgba(9,209,199,0.2);
      animation: cin-scanline 3.2s cubic-bezier(0.4,0,0.6,1) 0.6s 1 forwards;
      pointer-events:none; z-index:10;
    }
    /* Floating particles */
    .cin-particles {
      position:absolute; inset:0; pointer-events:none; overflow:hidden;
    }
    .cin-pt {
      position:absolute; border-radius:50%;
      background:rgba(9,209,199,0.5);
      animation: cin-particle linear infinite;
    }
    /* Vignette */
    .cin-vignette {
      position:absolute; inset:0;
      background: radial-gradient(ellipse 90% 90% at 50% 50%, transparent 40%, rgba(4,20,30,0.55) 100%);
      animation: cin-vignette-in 1.6s ease both;
      pointer-events:none;
    }
    /* Card */
    .cin-card {
      position:relative; z-index:5;
      background:rgba(255,255,255,0.10);
      backdrop-filter:blur(28px); -webkit-backdrop-filter:blur(28px);
      border:1px solid rgba(255,255,255,0.22);
      border-radius:28px;
      padding:36px 28px 32px;
      width:calc(100% - 40px); max-width:380px;
      box-shadow:
        0 32px 72px rgba(4,25,40,0.45),
        0 2px 0 rgba(255,255,255,0.15) inset,
        0 -1px 0 rgba(0,0,0,0.2) inset;
      animation: cin-card-rise 0.9s cubic-bezier(0.16,1,0.3,1) 0.7s both;
    }
    /* Inner card shimmer border */
    .cin-card::before {
      content:'';
      position:absolute; inset:-1px;
      border-radius:29px;
      background: linear-gradient(135deg,
        rgba(255,255,255,0.3) 0%,
        rgba(9,209,199,0.25) 30%,
        rgba(255,255,255,0.05) 60%,
        rgba(70,223,177,0.2) 100%);
      background-size:200% auto;
      animation: cin-shimmer 4s linear infinite 1.8s;
      z-index:-1;
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      padding:1px;
    }
    .cin-logo-wrap {
      animation: cin-logo-pop 0.8s cubic-bezier(0.34,1.56,0.64,1) 1.0s both;
    }
    .cin-title {
      animation: cin-title-slide 0.7s cubic-bezier(0.22,1,0.36,1) 1.3s both;
    }
    .cin-subtitle {
      animation: cin-subtitle-fade 0.6s ease 1.6s both;
    }
    .cin-field-1 {
      animation: cin-field-in 0.55s cubic-bezier(0.22,1,0.36,1) 1.85s both;
    }
    .cin-field-2 {
      animation: cin-field-in 0.55s cubic-bezier(0.22,1,0.36,1) 2.05s both;
    }
    .cin-btn-wrap {
      animation: cin-field-in 0.55s cubic-bezier(0.22,1,0.36,1) 2.25s both;
    }
    .cin-hint {
      animation: cin-hint-blink 2.8s ease-in-out 2.6s infinite;
    }
    .cin-login-btn {
      animation: cin-btn-glow 3s ease-in-out 3s infinite;
    }

    /* ═══════════════════════════════════════════════════
       EMPLOYEE OVERLAY — CINEMATIC SYSTEM
       Parallax depth · Volumetric light · Smooth easing
    ═══════════════════════════════════════════════════ */

    /* ── Employee overlay open/close transition ── */
    @keyframes emp-overlay-in {
      0%   { opacity:0; transform:translateX(-50%) translateY(100%) scale(0.97); filter:blur(6px); }
      55%  { filter:blur(0); }
      100% { opacity:1; transform:translateX(-50%) translateY(0) scale(1); filter:blur(0); }
    }
    @keyframes emp-bg-reveal {
      0%   { transform: scale(1.12); opacity:0; }
      100% { transform: scale(1);    opacity:1; }
    }
    @keyframes emp-orb-drift-a {
      0%,100% { transform: translate(0,0)       scale(1);    }
      33%     { transform: translate(18px,-22px) scale(1.10); }
      66%     { transform: translate(-12px,14px) scale(0.94); }
    }
    @keyframes emp-orb-drift-b {
      0%,100% { transform: translate(0,0)       scale(1);    }
      40%     { transform: translate(-20px,16px) scale(1.08); }
      70%     { transform: translate(14px,-10px) scale(0.96); }
    }
    @keyframes emp-orb-drift-c {
      0%,100% { transform: translate(0,0)       scale(1);    }
      50%     { transform: translate(10px,-18px) scale(1.05); }
    }
    @keyframes emp-scanline-sweep {
      0%   { top:0%;   opacity:0; }
      4%   { opacity:1; }
      96%  { opacity:0.4; }
      100% { top:100%; opacity:0; }
    }
    @keyframes emp-grid-in {
      from { opacity:0; transform:perspective(500px) rotateX(10deg) scale(0.96); }
      to   { opacity:1; transform:perspective(500px) rotateX(0deg)  scale(1); }
    }
    @keyframes emp-grid-drift {
      0%,100% { transform: translateY(0px)   scale(1); }
      50%     { transform: translateY(-12px) scale(1.02); }
    }
    @keyframes emp-noise {
      0%,100% { transform:translate(0,0); }
      20%  { transform:translate(-1%,-1%); }
      40%  { transform:translate(1%, 0.5%); }
      60%  { transform:translate(0%, 1%); }
      80%  { transform:translate(-0.5%, 0%); }
    }
    @keyframes emp-topbar-in {
      0%   { opacity:0; transform:translateY(-18px); filter:blur(4px); }
      100% { opacity:1; transform:translateY(0); filter:blur(0); }
    }
    @keyframes emp-particle {
      0%   { transform:translateY(100vh) rotate(0deg);   opacity:0; }
      8%   { opacity:0.5; }
      92%  { opacity:0.15; }
      100% { transform:translateY(-10vh) rotate(540deg); opacity:0; }
    }
    @keyframes emp-shimmer-border {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    @keyframes emp-vignette-in {
      from { opacity:0; }
      to   { opacity:1; }
    }
    @keyframes emp-card-wave {
      0%   { opacity:0; transform: translateY(24px) scale(0.93); filter:blur(4px); }
      55%  { filter:blur(0); }
      100% { opacity:1; transform: translateY(0) scale(1); filter:blur(0); }
    }
    @keyframes emp-counter-glow {
      0%,100% { box-shadow: 0 0 0 0 rgba(9,209,199,0); }
      50%     { box-shadow: 0 0 12px 3px rgba(9,209,199,0.25); }
    }
    @keyframes emp-search-glow {
      0%,100% { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
      50%     { box-shadow: 0 4px 18px rgba(9,209,199,0.18); }
    }
    @keyframes emp-brand-dot-pulse {
      0%,100% { transform:scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0.8); }
      50%     { transform:scale(1.2); box-shadow: 0 0 0 4px rgba(255,255,255,0); }
    }

    /* Employee Overlay — main shell */
    .emp-overlay{
      position:fixed; top:0; left:50%; transform:translateX(-50%) translateY(100%);
      width:100%; max-width:390px; height:100%;
      background:transparent;
      display:flex; flex-direction:column;
      z-index:400;
      overflow:hidden;
      transition:transform 0.52s cubic-bezier(0.16,1,0.3,1);
    }
    .emp-overlay.open{transform:translateX(-50%) translateY(0);}
    .emp-overlay.open .emp-cin-bg { animation: emp-bg-reveal 0.9s cubic-bezier(0.22,1,0.36,1) both; }
    .emp-overlay.open .emp-cin-topbar-wrap { animation: emp-topbar-in 0.55s cubic-bezier(0.22,1,0.36,1) 0.25s both; opacity:0; }

    /* ── Cinematic background layers (inside overlay) ── */
    .emp-cin-bg {
      position:absolute; inset:0; z-index:0; pointer-events:none;
      overflow:hidden;
    }
    .emp-cin-grad {
      position:absolute; inset:0;
      background: var(--emp-grad);
    }
    /* Subtle noise texture */
    .emp-cin-noise {
      position:absolute; inset:-20%; width:140%; height:140%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity:0.035;
      animation: emp-noise 10s steps(2) infinite;
    }
    /* Parallax depth grid */
    .emp-cin-grid {
      position:absolute; inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 44px 44px;
      transform-origin: center bottom;
      animation: emp-grid-in 1.6s cubic-bezier(0.22,1,0.36,1) 0.15s both,
                 emp-grid-drift 22s ease-in-out infinite 2s;
    }
    /* Depth orbs */
    .emp-cin-orb {
      position:absolute; border-radius:50%;
      filter:blur(55px); pointer-events:none;
    }
    .emp-cin-orb-1 {
      width:340px; height:340px; top:-100px; right:-90px;
      background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, rgba(9,209,199,0.22) 40%, transparent 70%);
      animation: emp-orb-drift-a 10s ease-in-out infinite;
    }
    .emp-cin-orb-2 {
      width:280px; height:280px; bottom:-70px; left:-70px;
      background: radial-gradient(circle, rgba(70,223,177,0.20) 0%, rgba(9,209,199,0.12) 50%, transparent 70%);
      animation: emp-orb-drift-b 13s ease-in-out infinite;
    }
    .emp-cin-orb-3 {
      width:200px; height:200px; top:40%; left:25%;
      background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 65%);
      animation: emp-orb-drift-c 16s ease-in-out infinite 1.5s;
    }
    /* Vignette */
    .emp-cin-vignette {
      position:absolute; inset:0;
      background: radial-gradient(ellipse 90% 90% at 50% 50%, transparent 35%, rgba(5,30,45,0.42) 100%);
      animation: emp-vignette-in 1.2s ease both;
    }
    /* Scanline sweep on open */
    .emp-cin-scanline {
      position:absolute; left:0; right:0; top:0; height:2px;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.55) 40%, rgba(9,209,199,0.85) 50%, rgba(255,255,255,0.55) 60%, transparent 100%);
      box-shadow: 0 0 14px rgba(9,209,199,0.6), 0 0 28px rgba(9,209,199,0.2);
      animation: emp-scanline-sweep 2.8s cubic-bezier(0.4,0,0.6,1) 0.3s 1 forwards;
      z-index:10;
    }
    /* Floating particles */
    .emp-cin-particles {
      position:absolute; inset:0; overflow:hidden; pointer-events:none;
    }
    .emp-cin-pt {
      position:absolute; border-radius:50%;
      background: rgba(255,255,255,0.55);
      animation: emp-particle linear infinite;
    }
    /* Top shimmer line */
    .emp-overlay::before {
      content:'';
      position:absolute; top:0; left:0; right:0; height:3px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(255,255,255,0.45) 25%,
        rgba(9,209,199,0.80) 50%,
        rgba(255,255,255,0.45) 75%,
        transparent 100%);
      background-size:200% auto;
      animation: emp-shimmer-border 3.5s linear infinite 0.8s;
      z-index:20;
    }
    /* Topbar glass — upgraded depth */
    .emp-cin-topbar-wrap { position:relative; z-index:10; flex-shrink:0; }
    .emp-topbar{
      background:rgba(255,255,255,0.18);
      backdrop-filter:blur(22px) saturate(160%);
      -webkit-backdrop-filter:blur(22px) saturate(160%);
      border-bottom:1px solid rgba(255,255,255,0.28);
      flex-shrink:0;
      padding:env(safe-area-inset-top,0) 0 0;
      box-shadow: 0 4px 24px rgba(5,30,45,0.12);
    }
    .emp-topbar-inner{padding:14px 16px 10px;}
    .emp-tb-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
    .emp-brand{display:flex;align-items:center;gap:7px;}
    .emp-brand-dot{width:8px;height:8px;border-radius:50%;background:#fff;animation:emp-brand-dot-pulse 2.2s ease-in-out infinite;box-shadow:0 0 8px #fff;}
    .emp-brand-name{color:var(--emp-dark);font-family:'Prompt',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:2px;}
    .emp-close-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.5);border:1px solid var(--emp-border);color:var(--emp-dark);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .emp-search-wrap{position:relative;}
    .emp-search-wrap input{
      width:100%;padding:10px 14px 10px 38px;
      background:rgba(255,255,255,0.20);
      border:1px solid rgba(255,255,255,0.35);

    /* ─── Page wrapper ─── */

<script type="text/plain" id="gas-template">// ═══════════════════════════════════════════════════
// StockScan IDC-3 — Google Apps Script
// ── ตั้งค่า LINE Messaging API ──────────────────────
// 1) วาง Channel Access Token จาก LINE Developers
// 2) วาง Group ID ของกลุ่มที่ต้องการแจ้งเตือน
// ════════════════════════════════════════════════════
var LINE_TOKEN = "";   // ← วาง Channel Access Token ตรงนี้
var LINE_GROUP = "";   // ← วาง Group ID ตรงนี้

function sendLine(msg) {
  if (!LINE_TOKEN || !LINE_GROUP) return;
  try {
    UrlFetchApp.fetch("https://api.line.me/v2/bot/message/push", {
      method: "post",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + LINE_TOKEN },
      payload: JSON.stringify({ to: LINE_GROUP, messages: [{ type: "text", text: msg }] }),
      muteHttpExceptions: true
    });
  } catch(e) { Logger.log("LINE error: " + e); }
}

function doGet(e){
  var ss=SpreadsheetApp.getActiveSpreadsheet();
  var iS=ss.getSheetByName("Items"),lS=ss.getSheetByName("Logs"),aS=ss.getSheetByName("Auth");
  if(!iS){iS=ss.insertSheet("Items");iS.appendRow(["ID","Name","Category","Stock","Unit","Min","Icon"]);}
  if(!lS){lS=ss.insertSheet("Logs");lS.appendRow(["Timestamp","QR_ID","Item_Name","Category","Quantity","Unit","Employee","Employee_ID","Note","Action"]);}
  if(!aS){aS=ss.insertSheet("Auth");aS.appendRow(["Employee_ID","Hash","Changed","UpdatedAt"]);}
  var authObj={};
  var aVals=aS.getDataRange().getValues();
  for(var i=1;i<aVals.length;i++){
    if(aVals[i][0])authObj[String(aVals[i][0])]={hash:String(aVals[i][1]),changed:aVals[i][2]===true||aVals[i][2]==='TRUE'||aVals[i][2]===1,updatedAt:String(aVals[i][3]||'')};
  }
  var payload=JSON.stringify({items:getItems(iS),logs:getLogs(lS),auth:authObj});
  var cb=e&&e.parameter&&e.parameter.callback;
  if(cb)return ContentService.createTextOutput(cb+"("+payload+")").setMimeType(ContentService.MimeType.JAVASCRIPT);
  return ContentService.createTextOutput(payload).setMimeType(ContentService.MimeType.JSON);
}
function doPost(e){const ss=SpreadsheetApp.getActiveSpreadsheet();const iS=ss.getSheetByName("Items")||ss.insertSheet("Items");const lS=ss.getSheetByName("Logs")||ss.insertSheet("Logs");const aS=ss.getSheetByName("Auth")||(()=>{var s=ss.insertSheet("Auth");s.appendRow(["Employee_ID","Hash","Changed","UpdatedAt"]);return s;})();const data=JSON.parse(e.postData.contents);
  if(data.action==="set_password"){
    var aVals=aS.getDataRange().getValues();var found=false;
    for(var i=1;i<aVals.length;i++){if(String(aVals[i][0])===String(data.employee_id)){aS.getRange(i+1,2,1,3).setValues([[data.hash,true,data.updatedAt||new Date().toISOString()]]);found=true;break;}}
    if(!found)aS.appendRow([data.employee_id,data.hash,true,data.updatedAt||new Date().toISOString()]);
  }else if(data.action==="add_items"){data.items.forEach(it=>iS.appendRow([it.id,it.name,it.cat,it.stock,it.unit,it.min,it.icon]));}else if(["withdraw","return","restock"].includes(data.action)){lS.appendRow([data.timestamp,data.qr_id,data.item_name,data.category,data.quantity,data.unit,data.employee_name||data.employee,data.employee_id||"",data.note||"",data.action]);const vals=iS.getDataRange().getValues();for(let i=1;i<vals.length;i++){if(String(vals[i][0])===String(data.qr_id)){const cur=Number(vals[i][3]);let next=cur;if(data.action==="withdraw")next=Math.max(0,cur-Number(data.quantity));else next=cur+Number(data.quantity);iS.getRange(i+1,4).setValue(next);break;}}
  var icon=data.action==="withdraw"?"📤":data.action==="return"?"📥":"📦";
  var label=data.action==="withdraw"?"เบิกของ":data.action==="return"?"คืนของ":"เติม Stock";
  var d=new Date();
  var ds=Utilities.formatDate(d,Session.getScriptTimeZone(),"d MMM yyyy HH:mm");
  var msg=icon+" แจ้งเตือน"+label+" — IDC-3\n"
    +"👤 พนักงาน: "+(data.employee_name||data.employee||"-")+"\n"
    +"📋 รายการ: "+data.item_name+"\n"
    +"🔢 จำนวน: "+data.quantity+" "+data.unit+"\n"
    +"🕐 เวลา: "+ds;
  sendLine(msg);
  }else if(data.action==="delete_item"){const vals=iS.getDataRange().getValues();for(let i=1;i<vals.length;i++){if(String(vals[i][0])===String(data.id)){iS.deleteRow(i+1);break;}}}return ContentService.createTextOutput(JSON.stringify({status:"ok"})).setMimeType(ContentService.MimeType.JSON);}
function getItems(sheet){const rows=sheet.getDataRange().getValues();if(rows.length<2)return[];const h=rows[0].map(c=>String(c).trim().toLowerCase());const col=k=>h.indexOf(k);return rows.slice(1).map(r=>({id:String(r[col('id')]||''),name:String(r[col('name')]||''),cat:String(r[col('category')]||r[col('cat')]||''),stock:Number(r[col('stock')])||0,unit:String(r[col('unit')]||'อัน'),min:Number(r[col('min')])||0,icon:String(r[col('icon')]||'📦')})).filter(it=>it.id);}
function getLogs(sheet){const rows=sheet.getDataRange().getValues();if(rows.length<2)return[];return rows.slice(1).reverse().slice(0,100).map(r=>{let qty=parseInt(r[4]);if(isNaN(qty))qty=0;return{timestamp:String(r[0]||''),qr_id:String(r[1]||''),item_name:String(r[2]||''),category:String(r[3]||''),quantity:qty,unit:String(r[5]||''),employee:String(r[6]||''),employee_id:String(r[7]||''),note:String(r[8]||''),action:String(r[9]||'withdraw')};});}
</script>

/* ══════════════════════════════════════════════════════
   AUTH SYSTEM v3 — GAS-backed persistent passwords
   ─────────────────────────────────────────────────────
   รหัสผ่านเริ่มต้น = ตัดตัวอักษรออกจาก ID
     OD1162769  → 1162769
     20085      → 20085
     671166     → 671166
   บังคับเปลี่ยนครั้งแรก → เก็บใน GAS Sheet "Auth"
   ── sync กลับมาทุกครั้งที่เปิด App ──────────────────
══════════════════════════════════════════════════════ */

function getDefaultPassword(empId){
  // ตัดตัวอักษร (a-z, A-Z) ออกทั้งหมด เหลือแต่ตัวเลข
  return empId.replace(/[A-Za-z]/g,'');
}

/* Auth state อยู่ใน React context — ไม่ใช้ localStorage เป็น source of truth
   แต่ยัง cache ไว้ใน localStorage เป็น fallback ระหว่างรอ sync */
function loadAuthCache(){try{return JSON.parse(localStorage.getItem('ss2_auth_v3'))||{};}catch(e){return{};}}
function saveAuthCache(data){try{localStorage.setItem('ss2_auth_v3',JSON.stringify(data));}catch(e){}}

/* Simple hash (FNV-1a 32bit) — ไม่ส่ง plaintext ไป sheet */
function hashPin(pin){
  let h=2166136261;
  for(let i=0;i<pin.length;i++){h^=pin.charCodeAt(i);h=(h*16777619)>>>0;}
  return h.toString(16).padStart(8,'0');
}

/* ── Login Screen ── */
function LoginScreen({onLogin, authData, isSyncing}){
  const [username,setUsername]=useState('');
  const [password,setPassword]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const [doShakeNow,setDoShakeNow]=useState(false);
  function triggerShake(){setDoShakeNow(true);setTimeout(()=>setDoShakeNow(false),500);}
  function handleLogin(){
    setErr('');
    const emp=EMPLOYEES.find(e=>e.id===username.trim());
    if(!emp){setErr('ไม่พบรหัสพนักงานนี้ในระบบ');triggerShake();return;}
    const empId=emp.id;
    const record=authData[empId];
    const isFirstLogin=!record||!record.changed;
    if(isFirstLogin){
      // ครั้งแรก: password = ส่วนตัวเลขของ ID
      const defaultPw=getDefaultPassword(empId);
      if(password!==defaultPw){
        setErr(`รหัสผ่านไม่ถูกต้อง\n(ครั้งแรก: ใช้ตัวเลขจากรหัสพนักงาน)`);
        triggerShake();return;
      }
    } else {
      // เคยตั้งรหัสแล้ว: เปรียบ hash
      if(hashPin(password)!==record.hash){
        setErr('รหัสผ่านไม่ถูกต้อง');triggerShake();return;
      }
    }
    setLoading(true);

/* ── Change Password Screen ── */
function ChangePasswordScreen({emp, onDone, gasUrl, onAuthUpdate}){
  const [step,setStep]=useState('new');
  const [newPin,setNewPin]=useState('');
  const [confirmPin,setConfirmPin]=useState('');
  const [doShakeNow,setDoShakeNow]=useState(false);
  const [err,setErr]=useState('');
  const [saving,setSaving]=useState(false);
  const current=step==='new'?newPin:confirmPin;
  const setCurrent=step==='new'?setNewPin:setConfirmPin;
  function triggerShake(){setDoShakeNow(true);setTimeout(()=>setDoShakeNow(false),500);}

  async function saveNewPassword(pin){
    setSaving(true);
    const hash=hashPin(pin);
    const record={hash,changed:true,updatedAt:new Date().toISOString()};
    // 1) อัป cache ในเครื่องก่อน (ใช้ได้ทันที)
    const cache=loadAuthCache();
    cache[emp.id]=record;
    saveAuthCache(cache);
    onAuthUpdate(emp.id,record);
    // 2) ส่งไป GAS Sheet (ถ้ามี URL)
    if(gasUrl){
      try{
        await fetch(gasUrl,{
          method:'POST',
          body:JSON.stringify({action:'set_password',employee_id:emp.id,hash,updatedAt:record.updatedAt})
        });
      }catch(e){/* network error — cache ยังใช้ได้ */}
    }
    setSaving(false);
    onDone();
  }

  function handleKey(k){
    if(saving)return;
    if(k==='del'){setCurrent(p=>p.slice(0,-1));return;}
    if(current.length>=6)return;
    const next=current+k;
    setCurrent(next);
    if(next.length===6){
      setTimeout(()=>{
        if(step==='new'){setStep('confirm');setErr('');}
        else{
          if(next!==newPin){setErr('รหัสผ่านไม่ตรงกัน ลองใหม่');setConfirmPin('');triggerShake();}
          else{saveNewPassword(next);}
        }
      },120);
    }
  }
  const dots=Array.from({length:6},(_,i)=>({filled:current.length>i}));
  const keys=['1','2','3','4','5','6','7','8','9','empty','0','del'];
  return(
    <div style={{position:'fixed',inset:0,zIndex:999,background:'rgba(12,100,120,0.5)',backdropFilter:'blur(8px)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Prompt',sans-serif"}}>
      <div style={{background:'#fff',borderRadius:24,padding:'32px 24px',width:'calc(100% - 40px)',maxWidth:380,boxShadow:'0 24px 60px rgba(12,100,120,0.25)',animation:'empUp .4s cubic-bezier(0.16,1,0.3,1)'}}>
        <div style={{width:60,height:60,borderRadius:18,background:'linear-gradient(135deg,var(--teal),var(--mid-teal))',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',fontSize:28,boxShadow:'0 6px 20px rgba(9,209,199,0.3)'}}>🔐</div>
        <div style={{textAlign:'center',fontSize:'1.2rem',fontWeight:700,color:'var(--txt)',marginBottom:4}}>ตั้งรหัสผ่านใหม่</div>
        <div style={{textAlign:'center',fontSize:'0.8rem',color:'var(--txt3)',marginBottom:20,fontFamily:"'Noto Sans Thai',sans-serif",lineHeight:1.6}}>
          {step==='new'?<>สวัสดีคุณ <strong>{emp.displayName}</strong><br/>กรุณาตั้งรหัสผ่านตัวเลข 6 หลักใหม่</>:<>กรุณากรอกรหัสผ่านอีกครั้ง<br/>เพื่อยืนยัน</>}
        </div>
        {saving&&<div style={{textAlign:'center',padding:'10px',color:'var(--teal)',fontFamily:"'Noto Sans Thai',sans-serif",fontSize:13,marginBottom:8}}>⏳ กำลังบันทึกรหัสผ่าน...</div>}
        {err&&<div style={{background:'#fff3f3',border:'1px solid #ffc8c8',borderRadius:10,padding:'8px 12px',color:'#cc3333',fontSize:'0.8rem',textAlign:'center',marginBottom:12,fontFamily:"'Noto Sans Thai',sans-serif"}}>{err}</div>}
        <div style={{textAlign:'center',fontSize:'0.72rem',fontWeight:600,color:'var(--txt3)',letterSpacing:'1px',textTransform:'uppercase',marginBottom:14,fontFamily:"'Noto Sans Thai',sans-serif"}}>{step==='new'?'กรอกรหัสผ่านใหม่':'ยืนยันรหัสผ่าน'}</div>
        <div style={{display:'flex',gap:10,justifyContent:'center',marginBottom:20}}>
          {dots.map((d,i)=>(
            <div key={i} style={{width:46,height:56,borderRadius:12,border:`2px solid ${d.filled?'var(--teal)':'var(--teal-border)'}`,background:d.filled?'var(--teal)':'var(--teal-dim)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.4rem',fontWeight:700,color:d.filled?'#fff':'var(--mid-teal)',transition:'0.15s',transform:d.filled?'scale(1.05)':'scale(1)',animation:doShakeNow?'shake 0.4s ease':undefined}}>
              {d.filled?'●':''}
            </div>
          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,maxWidth:260,margin:'0 auto'}}>
          {keys.map((k,i)=>(
            k==='empty'?<div key={i}/>:
            <button key={i} onClick={()=>handleKey(k)} disabled={saving} style={{height:52,borderRadius:14,border:'1.5px solid var(--teal-border)',background:'var(--surface)',color:'var(--txt)',fontFamily:"'Space Mono',monospace",fontSize:'1.2rem',fontWeight:700,cursor:saving?'not-allowed':'pointer',display:'flex',alignItems:'center',justifyContent:'center',transition:'0.15s',opacity:saving?0.5:1}}>
              {k==='del'?<i className="ti ti-backspace"/>:k}
            </button>
          ))}
        </div>
        {/* Info note */}
        <div style={{marginTop:16,padding:'8px 12px',borderRadius:10,background:'var(--teal-dim)',border:'1px solid var(--teal-border)',fontSize:11,color:'var(--txt2)',fontFamily:"'Noto Sans Thai',sans-serif",lineHeight:1.5,textAlign:'center'}}>
          🔒 รหัสผ่านจะถูกเข้ารหัสก่อนบันทึก<br/>และซิงค์กับระบบอัตโนมัติ
        </div>
      </div>
    </div>
  );
}

/* ── CameraOverlay ── */
function CameraOverlay({onScan,onClose}){
  const videoRef=useRef(null),canvasRef=useRef(null),streamRef=useRef(null),rafRef=useRef(null);
  const [status,setStatus]=useState('กำลังเปิดกล้อง...');
  useEffect(()=>{
    let lastScan=0,active=true;
    async function start(){
      try{
        const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}});
        if(!active){stream.getTracks().forEach(t=>t.stop());return;}
        streamRef.current=stream;const video=videoRef.current;video.srcObject=stream;await video.play();
        setStatus('พร้อมสแกน ✓');scanLoop();
      }catch(err){setStatus('❌ ไม่สามารถเปิดกล้องได้');setTimeout(()=>onClose(),2000);}
    }
    function scanLoop(){
      const video=videoRef.current,canvas=canvasRef.current;
      if(!video||!canvas)return;const ctx=canvas.getContext('2d');
      function tick(){
        if(!active)return;
        if(video.readyState===video.HAVE_ENOUGH_DATA){
          canvas.width=video.videoWidth;canvas.height=video.videoHeight;ctx.drawImage(video,0,0,canvas.width,canvas.height);
          const now=Date.now();
          if(now-lastScan>300){lastScan=now;try{const imgData=ctx.getImageData(0,0,canvas.width,canvas.height);const code=window.jsQR&&window.jsQR(imgData.data,imgData.width,imgData.height,{inversionAttempts:'dontInvert'});if(code&&code.data){active=false;onScan(code.data.trim());return;}}catch(e){}}
        }
        rafRef.current=requestAnimationFrame(tick);
      }
      rafRef.current=requestAnimationFrame(tick);
    }
    start();
    return()=>{active=false;if(rafRef.current)cancelAnimationFrame(rafRef.current);if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());};
  },[]);
  return(
    <div style={{position:'fixed',inset:0,zIndex:100,background:'#000',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
      <video ref={videoRef} autoPlay playsInline muted style={{width:'100%',maxWidth:390,height:'100%',objectFit:'cover',position:'absolute',inset:0}}/>
      <canvas ref={canvasRef} style={{display:'none'}}/>
      <button onClick={onClose} style={{position:'absolute',top:48,right:16,zIndex:20,background:'rgba(255,255,255,0.15)',border:'1px solid rgba(255,255,255,0.3)',color:'#fff',borderRadius:'50%',width:44,height:44,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,cursor:'pointer',backdropFilter:'blur(10px)'}}>
        <i className="ti ti-x"/>
      </button>
      <div style={{position:'relative',zIndex:10,display:'flex',flexDirection:'column',alignItems:'center',gap:16,width:'100%'}}>
        <div style={{width:240,height:240,borderRadius:20,position:'relative',boxShadow:'0 0 0 2000px rgba(33,58,88,0.6)'}}>

function StatCard({icon,value,label,accent,dimBg,borderColor}){

    <div style={{background:dimBg,border:`1.5px solid ${borderColor}`,borderRadius:20,padding:'18px 16px',boxShadow:'0 2px 8px rgba(33,58,88,0.06)'}}>

        <div style={{display:'flex',alignItems:'baseline',gap:10}}>
          <div style={{fontFamily:"'Outfit',sans-serif",fontSize:58,fontWeight:800,lineHeight:1,letterSpacing:'-3px',color:'#fff'}}>{wl.length}</div>
          <div>
            <div style={{fontSize:13,color:'rgba(255,255,255,0.6)',fontWeight:600}}>ครั้งที่เบิก</div>
            <div style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:'rgba(255,255,255,0.3)'}}>{lastTs?lastTs.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}):'—'}</div>

        <button onClick={onGoScan} style={{marginTop:16,width:'100%',padding:11,borderRadius:14,border:'1px solid rgba(255,255,255,0.15)',background:'rgba(255,255,255,0.09)',color:'#fff',fontFamily:"'Noto Sans Thai',sans-serif",fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>

/* ── PageLog ── */
function PageLog({logs,items,onSync}){
  const [search,setSearch]=useState('');
  const [fw,setFw]=useState('week');
  const [showDebug,setShowDebug]=useState(false);
  const now=new Date(),ws=new Date(now);
  ws.setDate(now.getDate()-now.getDay());ws.setHours(0,0,0,0);
  const filtered=logs.filter(l=>{
    const q=search.toLowerCase();
    const empObj=EMPLOYEES.find(e=>l.employee&&(e.id===l.employee||e.name===l.employee));
    const m=!q||(l.item_name||'').toLowerCase().includes(q)||(l.employee||'').toLowerCase().includes(q)||(l.qr_id||'').toLowerCase().includes(q)||(empObj&&empObj.name.toLowerCase().includes(q));
    if(!m)return false;if(fw==='all')return true;
    const d=parseTs(l.timestamp);if(!d)return false;
    if(fw==='today')return d.toDateString()===now.toDateString();

    if(fw==='month')return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    return true;

      {filtered.length>0&&(

          <Pill color="var(--mid-teal)" bg="var(--teal-dim)" border="var(--teal-border)"><i className="ti ti-list-check" style={{fontSize:11}}/> {filtered.length} รายการ</Pill>
          <Pill color="var(--mid-teal)" bg="var(--mint-dim)" border="var(--mint-border)"><i className="ti ti-box" style={{fontSize:11}}/> {uniqueItem} ชนิด</Pill>

          <Pill color="#CC6A00" bg="#FFF4EC" border="#FFC899"><i className="ti ti-stack-2" style={{fontSize:11}}/> รวม {totalQty} ชิ้น</Pill>
        </div>
      )}
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'0 0 6px',borderBottom:'1px solid var(--teal-border)'}}>
        <div style={{width:40,flexShrink:0}}/>

  return <div className="page-cinematic"><SetupContent cfg={cfg} onSave={onSave} onSync={onSync} onLock={onLock}/></div>;
}

/* ── Main App ── */
function StockScan(){
  const [loggedInEmp,setLoggedInEmp]=useState(null);
  const [needChangePw,setNeedChangePw]=useState(false);
  // authData: { [empId]: { hash, changed, updatedAt } }
  const [authData,setAuthData]=useState(()=>loadAuthCache());
  const [items,setItems]=useState(()=>normalizeItems(loadLocal('ss2_items',[])));
  const [logs,setLogs]=useState(()=>normalizeLogs(loadLocal('ss2_logs',[])));
  const [cfg,setCfg]=useState(()=>{const c=loadLocal('ss2_cfg',{});if(!c.url)c.url=DEFAULT_GAS_URL;return c;});
  const [activePage,setActivePage]=useState('home');
  const [curItem,setCurItem]=useState(null);
  const [setupUnlocked,setSetupUnlocked]=useState(false);
  const [isSyncing,setIsSyncing]=useState(false);
  const [syncStatus,setSyncStatus]=useState('none');
  const [pinTarget,setPinTarget]=useState(null);
  const [showCamera,setShowCamera]=useState(false);
  const [showDirectory,setShowDirectory]=useState(false);
  const [toast,setToast]=useState(null);

  const showToast=useCallback((msg,color)=>{setToast({msg,color:color||'#213A58'});setTimeout(()=>setToast(null),2800);},[]);

  // sync authData cache whenever it changes
  useEffect(()=>{saveAuthCache(authData);},[authData]);
  useEffect(()=>{localStorage.setItem('ss2_items',JSON.stringify(items));},[items]);
  useEffect(()=>{localStorage.setItem('ss2_logs',JSON.stringify(logs));},[logs]);
  useEffect(()=>{localStorage.setItem('ss2_cfg',JSON.stringify(cfg));},[cfg]);
  useEffect(()=>{ syncData(); }, [cfg.url]);

// เผื่อไว้ให้ซิงค์อีกครั้งตอนผู้ใช้ล็อคอินเสร็จ
useEffect(()=>{ if(loggedInEmp) syncData(); }, [loggedInEmp]);

  // callback from ChangePasswordScreen to update local authData
  function handleAuthUpdate(empId, record){
    setAuthData(prev=>({...prev,[empId]:record}));
  }

  // ── Auth guards ──
  if(!loggedInEmp) return <LoginScreen authData={authData} isSyncing={isSyncing} onLogin={(emp,isFirst)=>{setLoggedInEmp(emp);setNeedChangePw(isFirst);}}/>;
  if(needChangePw) return <ChangePasswordScreen emp={loggedInEmp} gasUrl={cfg.url} onAuthUpdate={handleAuthUpdate} onDone={()=>setNeedChangePw(false)}/>;
  function handleLogout(){if(!window.confirm('ต้องการออกจากระบบ?'))return;setLoggedInEmp(null);setNeedChangePw(false);setSetupUnlocked(false);setActivePage('home');}

  async function fetchViaFetch(url){const res=await fetch(url+(url.includes('?')?'&':'?')+'_t='+Date.now(),{method:'GET',redirect:'follow'});const text=await res.text();const clean=text.trim();if(clean.startsWith('{')||clean.startsWith('['))return JSON.parse(clean);const m=clean.match(/^[^(]+\((.+)\)\s*;?\s*$/s);if(m)return JSON.parse(m[1]);throw new Error('Unexpected response');}
  function fetchViaJsonp(url){return new Promise((resolve,reject)=>{const cbName='_gs_'+Date.now()+'_'+Math.floor(Math.random()*99999);const script=document.createElement('script');let settled=false;const finish=fn=>{if(settled)return;settled=true;clearTimeout(timer);delete window[cbName];if(script.parentNode)script.parentNode.removeChild(script);fn();};const timer=setTimeout(()=>finish(()=>reject(new Error('timeout'))),15000);window[cbName]=data=>finish(()=>resolve(data));script.src=url+(url.includes('?')?'&':'?')+'callback='+cbName+'&_t='+Date.now();script.onerror=()=>finish(()=>reject(new Error('blocked')));document.head.appendChild(script);});}
  async function gasPost(url,body){const res=await fetch(url,{method:'POST',body:JSON.stringify(body)});try{return JSON.parse(await res.text());}catch(e){return{status:'ok'};}}

  function applyResponseData(data){if(!data||!Array.isArray(data.items))throw new Error('No items');setItems(normalizeItems(data.items));setLogs(normalizeLogs(data.logs||[]));}

  async function syncData(){
    if(!cfg.url){setSyncStatus('none');return;}if(isSyncing)return;
    setIsSyncing(true);setSyncStatus('syncing');let ok=false;
    try{const d=await fetchViaFetch(cfg.url);applyResponseData(d);
      // merge auth records from GAS if present
      if(d.auth&&typeof d.auth==='object'){
        setAuthData(prev=>{const merged={...prev,...d.auth};saveAuthCache(merged);return merged;});
      }
      setSyncStatus('ok');ok=true;
    }catch(e1){try{const d=await fetchViaJsonp(cfg.url);applyResponseData(d);
      if(d.auth&&typeof d.auth==='object'){
        setAuthData(prev=>{const merged={...prev,...d.auth};saveAuthCache(merged);return merged;});
      }
      setSyncStatus('ok');ok=true;}catch(e2){}}
    if(!ok){setSyncStatus('error');showToast('ซิงค์ไม่ได้ — ตรวจ GAS URL หรือเน็ต','#FF4D4D');}
    setIsSyncing(false);
  }

  function requestAdminAccess(){setActivePage('admin');if(!setupUnlocked)setPinTarget('admin');}
  function requestSetupAccess(){setActivePage('setup');if(!setupUnlocked)setPinTarget('setup');}
  function requestRestockAccess(){setPinTarget('restock');}
  
  function onPinSuccess(target){
    setSetupUnlocked(true);
    setPinTarget(null);
    if(target==='restock') showToast('✓ ปลดล็อคโหมดเติม Stock แล้ว');
    else if(target==='setup') showToast('✓ เข้าสู่หน้าตั้งค่าแล้ว');
    else showToast('✓ เข้าสู่โหมด Admin แล้ว');
  }
  
  function lockAdmin(){setSetupUnlocked(false);showToast('🔒 ล็อคการตั้งค่า/Admin แล้ว');setActivePage('home');}
  function scanItem(code){const it=items.find(x=>x.id===code);if(!it){showToast('ไม่เจอ QR นี้ในระบบ ❌','#FF4D4D');return;}setCurItem(it);setActivePage('scan');}

  async function confirmAction(mode,empObj,qty,note){
    if(!curItem)return;
    if(qty<1){showToast('จำนวนต้องมากกว่า 0','#FFB700');return;}
    if(mode==='withdraw'&&qty>curItem.stock){showToast('จำนวนเกินสต๊อก ❌','#FF4D4D');return;}
    const emp=empObj||loggedInEmp;
    const ts=nowISO();const snap={...curItem};
    const modeLabel=mode==='withdraw'?'เบิก':mode==='return'?'คืน':'เติม Stock';
    const toastColor=mode==='withdraw'?'#213A58':mode==='return'?'#4A90D9':'var(--mid-teal)';
    setItems(prev=>prev.map(x=>{if(x.id!==snap.id)return x;if(mode==='withdraw')return{...x,stock:x.stock-qty};return{...x,stock:x.stock+qty};}));
    setLogs(prev=>[{timestamp:ts,qr_id:snap.id,item_name:snap.name,cat:snap.cat,quantity:qty,unit:snap.unit,employee:emp.id,note:note||'',action:mode},...prev]);
    setCurItem(null);
    showToast(`กำลังบันทึก${modeLabel} "${snap.name}" ☁...`,toastColor);
    if(cfg.url){
      try{
        await gasPost(cfg.url,{action:mode,timestamp:ts,qr_id:snap.id,item_name:snap.name,category:snap.cat,quantity:qty,unit:snap.unit,employee:emp.id,employee_name:emp.name,employee_id:emp.id,note:note||''});
        showToast(`${modeLabel} "${snap.name}" ${qty} ${snap.unit} สำเร็จ ✓`,toastColor);
        setTimeout(syncData,1000);
      }catch(e){showToast(`บันทึกในเครื่องแล้ว (ส่งไป Sheet ไม่ได้)`,'#FFB700');}
    }else{showToast('บันทึกในเครื่องแล้ว (ยังไม่ได้เชื่อม Sheet)','#FFB700');}
  }

  async function addItem(formData){
    if(!cfg.url){showToast('กรุณาตั้งค่า GAS URL ก่อน ⚠','#FFB700');return;}
    const{name,cat,stock,unit,min,icon,count}=formData;
    if(!name){showToast('ใส่ชื่ออุปกรณ์ด้วยนะ ⚠','#FFB700');return;}
    const cnt=Math.max(1,parseInt(count)||1);
    const newItems=Array.from({length:cnt},()=>({id:uid(),name,cat,stock:parseInt(stock)||0,unit:unit||'อัน',min:parseInt(min)||10,icon:icon||'📦'}));
    showToast(`กำลังบันทึก "${name}" ${cnt} ชิ้น ☁...`);
    try{await gasPost(cfg.url,{action:'add_items',items:newItems});showToast(`บันทึก "${name}" สำเร็จ ✓`);await syncData();}catch(e){showToast('มีปัญหาการส่งไป Sheet','#FF4D4D');}
  }

  async function delItem(id){
    if(!confirm('ยืนยันการลบอุปกรณ์นี้?'))return;
    if(!cfg.url){showToast('ยังไม่ได้เชื่อม Sheet','#FFB700');return;}
    try{await gasPost(cfg.url,{action:'delete_item',id});showToast('ลบแล้ว ✓');await syncData();}catch(e){showToast('ลบไม่สำเร็จ','#FF4D4D');}
  }

  function saveSettings(url){const newCfg={...cfg,url};setCfg(newCfg);setTimeout(syncData,200);}

  return(
    <div style={{fontFamily:"'Noto Sans Thai',sans-serif",background:'var(--bg)',color:'var(--txt)',maxWidth:390,margin:'0 auto',minHeight:'100vh',overflowX:'hidden',paddingBottom:88}}>
      <TopBar syncStatus={syncStatus} onSync={syncData} onOpenDirectory={()=>setShowDirectory(true)} loggedInEmp={loggedInEmp} onLogout={handleLogout}/>
      <div style={{padding:'0 14px'}}>
        {activePage==='home'&&<PageHome items={items} logs={logs} onGoScan={()=>setActivePage('scan')}/>}
        {activePage==='scan'&&<PageScan items={items} curItem={curItem} onScan={scanItem} onConfirm={confirmAction} onCancel={()=>setCurItem(null)} onOpenCamera={()=>setShowCamera(true)} loggedInEmp={loggedInEmp} setupUnlocked={setupUnlocked} onUnlockRestock={requestRestockAccess}/>}
        {activePage==='log'&&<PageLog logs={logs} items={items} onSync={syncData}/>}
        {activePage==='admin'&&<PageAdmin items={items} setupUnlocked={setupUnlocked} onAddItem={addItem} onDelItem={delItem} onLock={lockAdmin} onUnlock={requestAdminAccess}/>}
        {activePage==='setup'&&<PageSetup cfg={cfg} setupUnlocked={setupUnlocked} onSave={saveSettings} onSync={syncData} onLock={lockAdmin} onUnlock={requestSetupAccess}/>}
      </div>
      <BottomNav activePage={activePage} onGoHome={()=>setActivePage('home')} onGoLog={()=>setActivePage('log')} onGoScan={()=>setActivePage('scan')} onGoAdmin={requestAdminAccess} onGoSetup={requestSetupAccess}/>
      {pinTarget&&<PinModal target={pinTarget} correctPin={SECURE_PIN} onSuccess={()=>onPinSuccess(pinTarget)} onClose={()=>{setPinTarget(null);if(!setupUnlocked&&pinTarget!=='restock')setActivePage('home');}}/>}
      {showCamera&&<CameraOverlay onScan={code=>{setShowCamera(false);scanItem(code);}} onClose={()=>setShowCamera(false)}/>}
      {/* ★ Employee Directory Overlay ★ */}
      <EmployeeDirectory isOpen={showDirectory} onClose={()=>setShowDirectory(false)} selectMode={false}/>
      {toast&&<div style={{position:'fixed',bottom:96,left:'50%',transform:'translateX(-50%)',background:toast.color,color:'#fff',borderRadius:100,padding:'12px 24px',fontSize:13,zIndex:300,whiteSpace:'nowrap',boxShadow:'0 8px 32px rgba(33,58,88,0.2)',animation:'toastPop .3s cubic-bezier(0.34,1.56,0.64,1)'}}>{toast.msg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<StockScan/>);

/* ── Cinematic Engine ── */
(function CinematicEngine(){
  const EASE = 'cubic-bezier(0.16,1,0.3,1)';
  let lastKey = '';
  function retrig(el){ el.style.animationName='none'; void el.offsetHeight; el.style.animationName=''; }
  function staggerIn(els, step, start){
    els.forEach((el,i)=>{
      if(el.dataset.cin) return;
      el.dataset.cin='1';
      el.style.opacity='0';
      el.style.transform='translateY(22px) scale(0.94)';
      setTimeout(()=>{
        el.style.transition=`opacity 0.44s ${EASE}, transform 0.44s ${EASE}`;
        el.style.opacity='1';
        el.style.transform='translateY(0) scale(1)';
      }, start + i*step);
    });
  }
  const obs = new MutationObserver(()=>{
    const root = document.getElementById('root');
    if(!root) return;
    const pages = root.querySelectorAll('.page-cinematic');
    const key = pages.length + (pages[0] ? pages[0].children.length : 0) + root.querySelector('[class*="page-"]')?.className;
    if(key !== lastKey){
      lastKey = key;
      pages.forEach(p => retrig(p));
      setTimeout(()=>{
        pages.forEach(p=>{
          const directCards = Array.from(p.children).filter(el=>{
            const s = el.getAttribute('style')||'';
            return s.includes('borderRadius:28') || s.includes('borderRadius:20');
          });
          staggerIn(directCards, 70, 100);
          p.querySelectorAll('.cin-stat-1,.cin-stat-2,.cin-stat-3,.cin-stat-4').forEach((card,ci)=>{
            if(card.dataset.popped) return;
            card.dataset.popped='1';
            const num = card.querySelector('div');
            if(num){ setTimeout(()=>{ num.style.transition='transform 0.38s cubic-bezier(0.34,1.56,0.64,1)'; num.style.transform='scale(1.28)'; setTimeout(()=>num.style.transform='scale(1)',190); }, 160+ci*110); }
          });
        });
      }, 55);
    }
    const empGrid = root.querySelector('.emp-grid-list');
    if(empGrid){ staggerIn(Array.from(empGrid.querySelectorAll('.emp-grid-card:not([data-cin])')), 32, 35); }
  });
  obs.observe(document.body, { childList:true, subtree:true });
})();

</script>
